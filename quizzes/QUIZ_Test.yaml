long_answer:
  points: 6
  rubric: 'To achieve full marks (10 points), the response must cover:


    1. Chlorine Test Method & Observation (2 points):

    - Mentions using damp blue litmus paper (1 point).

    - Identifies the color change from blue to white (bleached) (1 point).


    2. Chlorine Acidic Explanation (2 points):

    - Explains that the paper may briefly turn red before bleaching (1 point).

    - Explains this is because chlorine dissolves in water to form acidic hydrochloric
    acid (1 point).


    3. Chlorine Safety Precaution (2 points):

    - Explains that chlorine is poisonous (1 point).

    - States it must be handled in a fume cupboard or while wearing a mask (1 point).


    4. Carbon Dioxide Test Method & Observation (2 points):

    - Mentions bubbling the gas through an aqueous solution of calcium hydroxide (lime
    water) (1 point).

    - Identifies that the lime water turns cloudy (1 point).


    5. Carbon Dioxide Chemical Explanation (2 points):

    - Explains that the cloudiness is caused by the formation of solid calcium carbonate
    particles (1 point).

    - Mentions this is due to the reaction between carbon dioxide and calcium hydroxide
    (1 point).'
  text: Explain how to test for both chlorine gas and carbon dioxide gas. In your
    response, detail the testing methods, the observations made during positive tests
    (including any temporary intermediate changes), the chemical explanations behind
    these observations, and any necessary safety precautions.
